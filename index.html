<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Launcher (iframe)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
    }

    .btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    button {
      padding: 10px 14px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #eee;
    }

    .bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    input[type="text"] {
      width: min(900px, 100%);
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    iframe {
      width: 100%;
      height: 70vh;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #000;
    }

    .hint {
      color: #666;
      font-size: 13px;
      margin-top: 6px;
    }

    .status {
      font-size: 13px;
      color: #333;
    }

    code {
      background: #f3f3f3;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <h1>실험용 플레이어 페이지(iframe)</h1>

  <div class="btns">
    <button type="button" id="btnDash">DASH VOD</button>
    <button type="button" id="btnHls">HLS Live</button>
    <button type="button" id="btn360">360 Video</button>
    <button type="button" id="btnClear">비우기</button>
    <button type="button" id="btnAuto">자동 재생 (DASH→360→HLS)</button>
  </div>

  <div class="bar">
    <input id="customUrl" type="text" placeholder="직접 URL 입력 후 Enter 또는 '적용' 클릭" />
    <button type="button" id="btnApply">적용</button>
    <span class="status" id="status">현재 src: (없음)</span>
  </div>

  <hr />

  <iframe id="playerFrame" src="" title="플레이어"></iframe>

  <script>
    const SRC_DASH = "https://10.20.13.157:8442"; 
    const SRC_HLS = "https://10.20.13.157:8440"; 
    const SRC_360 = "https://10.20.13.157:443/#/player";
    let CONFIG = null;

    async function loadConfig() {
      const res = await fetch('./config.json', { cache: 'no-store' });
      if (!res.ok) throw new Error(`config.json load failed: ${res.status}`);
      CONFIG = await res.json();
      return CONFIG;
    }


    const frame = document.getElementById("playerFrame");
    const status = document.getElementById("status");
    const customUrl = document.getElementById("customUrl");
    // ---- cross-origin 대응: postMessage로 명령 보내기 ----
    function originOf(url) {
      try { return new URL(url).origin; } catch { return "*"; }
    }

    function sendPlayCommandToIframe({ playerType, videoUrl }) {
      const msg = {
        type: "PLAYER_CONTROL",
        action: "SET_URL_AND_PLAY",
        playerType,   // "dash" | "v360" | "hls"
        videoUrl
      };

      // iframe이 로드된 뒤에 보내야 하므로, load 이벤트를 기다린다.
      return new Promise((resolve, reject) => {
        const targetOrigin = originOf(frame.src);

        const onAck = (event) => {
          // if (event.origin !== targetOrigin) return;

          const data = event.data;
          if (!data || data.type !== "PLAYER_CONTROL_ACK") return;
          window.removeEventListener("message", onAck);
          resolve(data);
        };

        window.addEventListener("message", onAck);

        // 메시지 전송
        frame.contentWindow.postMessage(msg, targetOrigin);

        // ack 타임아웃(원하면 조정)
        setTimeout(() => {
          window.removeEventListener("message", onAck);
          reject(new Error("ACK timeout - player did not respond."));
        }, 5000);
      });
    }

    function waitPlayerReady(player) {
      return new Promise(resolve => {
        const onMsg = (e) => {
          if (e.data?.type === 'PLAYER_READY' && e.data.player === player) {
            window.removeEventListener('message', onMsg);
            resolve();
          }
        };
        window.addEventListener('message', onMsg);
      });
    }

    // iframe을 특정 플레이어로 로드하고, 로드 완료 후 play command 전달
    function loadPlayerAndAutoPlay({ playerSrc, playerType, videoUrl }) {
      return new Promise((resolve, reject) => {
        const onLoad = async () => {
          frame.removeEventListener("load", onLoad);
          try {
            await waitPlayerReady(playerType);

            await sendPlayCommandToIframe({ playerType, videoUrl });
            resolve();
          } catch (e) {
            reject(e);
          }
        };

        frame.addEventListener("load", onLoad);
        setFrameSrc(playerSrc);
      });
    }

    async function runAutoSequence() {
      if (!CONFIG) await loadConfig();

      const steps = CONFIG.experiments.map(exp => ({
        name: exp.name,
        playerSrc: CONFIG.players[exp.playerType].src,
        playerType: exp.playerType,
        videoUrl: exp.videoUrl,
        playSeconds: exp.playSeconds ?? 10
      }));
      // const steps = [
      //   { name: "DASH", playerSrc: SRC_DASH, playerType: "dash", videoUrl: VIDEO_URLS.dash },
      //   { name: "360", playerSrc: SRC_360, playerType: "v360", videoUrl: VIDEO_URLS.v360 },
      //   { name: "HLS", playerSrc: SRC_HLS, playerType: "hls", videoUrl: VIDEO_URLS.hls },
      // ];

      for (const s of steps) {
        status.textContent = `자동 재생: ${s.name} 로딩 중...`;
        await loadPlayerAndAutoPlay(s);
        status.textContent = `자동 재생: ${s.name} 재생 시작`;

        //  일단은 고정 대기시간으로 처리(예: 10초)
        await new Promise(r => setTimeout(r, s.playSeconds * 1000));
      }

      status.textContent = "자동 재생 시퀀스 완료";
    }


    function setFrameSrc(url) {
      frame.src = url || "";
      status.textContent = "현재 src: " + (frame.src || "(없음)");
      if (url) customUrl.value = url;
    }

    document.getElementById("btnDash").addEventListener("click", () => {
      if (!SRC_DASH) return alert("SRC_DASH 값을 먼저 채워주세요.");
      setFrameSrc(SRC_DASH);
    });

    document.getElementById("btnHls").addEventListener("click", () => {
      if (!SRC_HLS) return alert("SRC_HLS 값을 먼저 채워주세요.");
      setFrameSrc(SRC_HLS);
    });

    document.getElementById("btn360").addEventListener("click", () => {
      if (!SRC_360) return alert("SRC_360 값을 먼저 채워주세요.");
      setFrameSrc(SRC_360);
    });

    document.getElementById("btnClear").addEventListener("click", () => {
      setFrameSrc("");
      customUrl.value = "";
    });

    // document.getElementById("btnReload").addEventListener("click", () => {
    //   try {
    //     // 같은 origin이면 내부 reload 가능, 아니면 브라우저 정책상 제한될 수 있음.
    //     frame.contentWindow.location.reload();
    //   } catch (e) {
    //     // cross-origin이면 그냥 src 재할당으로 "비슷하게" 새로고침
    //     if (frame.src) frame.src = frame.src;
    //   }
    // });

    document.getElementById("btnApply").addEventListener("click", () => {
      const url = customUrl.value.trim();
      if (!url) return alert("URL을 입력하세요.");
      setFrameSrc(url);
    });

    customUrl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        document.getElementById("btnApply").click();
      }
    });

    // 자동 재생 버튼
    document.getElementById("btnAuto").addEventListener("click", () => {
      runAutoSequence().catch(err => {
        console.error(err);
        alert("자동 재생 실패: " + err.message);
      });
    });

    // 초기 상태 표시
    status.textContent = "현재 src: (없음)";

    const latestStats = { dash: null, v360: null, hls: null };

    /* ====== 플레이어 지표 수신 (추가) ====== */
    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (!msg) return;

      if (msg.type === "PLAYER_STATS") {
        latestStats[msg.player] = msg; // 최신값 저장
        console.log('[STATS]', msg.player, msg.stats, msg.ts);

        if (msg.player === 'dash') {
          // 플레이어 마다 별도 처리
          // status.textContent = `DASH latency=${msg.stats.videoLatency}, dl=${msg.stats.videoDownload}, ratio=${msg.stats.videoRatio}`;
        }
        // TODO: 여기서 원하는 작업 수행: 화면 표시 등
        //
      }
    });

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        await loadConfig();
        status.textContent = '설정 로드 완료';
      } catch (e) {
        console.error(e);
        status.textContent = '설정 로드 실패: ' + e.message;
      }
    });

  </script>
</body>

</html>
